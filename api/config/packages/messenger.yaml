framework:
    messenger:
        transports:
            api_subtitle_generator:
                dsn: "%env(MESSENGER_TRANSPORT_DSN)%"
                serializer: App\Messenger\Serializer\ProtobufSerializer
                options:
                    exchange:
                        name: messages
                        type: direct
                    auto_setup: true
                    queues:
                        api_subtitle_generator:
                            binding_keys: [api_subtitle_generator]
        routing:
            'App\Protobuf\MediaPod': api_subtitle_generator
