syntax = "proto3";

option php_namespace = "Protobuf";
option php_metadata_namespace = "Protobuf\\GPBMetadata";

message ApiSubtitleGenerator {
    MediaPod mediaPod = 1;
}

message SubtitleGeneratorApi {
    MediaPod mediaPod = 1;
}

message MediaPod {
    string uuid = 1;
    string userUuid = 2;
    Video originalVideo = 3;
}

message Video {
    string name = 1;
    string mimeType = 2;
    int64 size = 3;
}
